<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | Postal Service</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Overlay -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="user_dashboard.html">
                    <img src="images/logo.webp" alt="Stackly Logo" class="sidebar-logo">
                </a>
            </div>
            
            <div class="sidebar-menu">
                <div class="menu-title">Main</div>
                <ul>
                    <li><a href="user_dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a></li>
                    <li><a href="user_dashboard_shipments.html"><i class="bi bi-box-seam"></i> My Shipments</a></li>
                    <li><a href="user_dashboard_track.html"><i class="bi bi-geo-alt"></i> Track Parcel</a></li>
                </ul>
                
                <div class="menu-title mt-4">Account</div>
                <ul>
                    <li><a href="user_dashboard_billing.html"><i class="bi bi-receipt"></i> Billing & Invoices</a></li>
                    <li><a href="user_dashboard_profile.html" class="active"><i class="bi bi-person"></i> Profile Settings</a></li>
                    <li><a href="user_dashboard_support.html"><i class="bi bi-headset"></i> Support</a></li>
                </ul>
            </div>
            
            </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="d-flex align-items-center">
                    <button class="mobile-toggle" onclick="toggleSidebar()">
                        <i class="bi bi-list"></i>
                    </button>
                    <h5 class="mb-0 ms-2 fw-bold text-dark d-none d-md-block">Welcome back, <span class="user-name-display">User</span></h5>
                </div>
                
                <div class="navbar-actions d-flex align-items-center"><span class="user-email-display me-3 fw-bold text-muted" style="font-size: 14px;"></span>
                    
                    <a href="index.html" class="action-btn text-danger ms-3" title="Logout">
                        <i class="bi bi-box-arrow-right"></i>
                    </a>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="content-area">
    <div class="page-header"><h1 class="page-title">Profile Settings</h1><button class="btn btn-primary shadow-sm" onclick="window.location.href='dashboard_404.html'">Save Changes</button></div>
    <div class="card border-0 shadow-sm p-4">
        <div class="row">
            <div class="col-md-3 text-center"><div class="user-avatar mx-auto mb-3" style="width: 100px; height: 100px; font-size: 2rem;">JD</div><button class="btn btn-sm btn-outline-secondary" onclick="window.location.href='dashboard_404.html'">Change Avatar</button></div>
            <div class="col-md-9">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">First Name</label><input type="text" class="form-control" value="John"></div>
                    <div class="col-md-6"><label class="form-label">Last Name</label><input type="text" class="form-control" value="Doe"></div>
                    <div class="col-md-6"><label class="form-label">Email Address</label><input type="email" class="form-control" value="john.doe@example.com"></div>
                    <div class="col-md-6"><label class="form-label">Phone Number</label><input type="text" class="form-control" value="+1 (555) 123-4567"></div>
                    <div class="col-12"><label class="form-label">Company Name (Optional)</label><input type="text" class="form-control" value="JD Enterprises"></div>
                </div>
            </div>
        </div>
    </div>
</div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
            document.querySelector('.sidebar-overlay').classList.toggle('show');
        }
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const email = localStorage.getItem('userEmail');
            if(email) {
                document.querySelectorAll('.user-email-display').forEach(el => el.textContent = email);
            }
            const name = localStorage.getItem('userName');
            if(name) {
                document.querySelectorAll('.user-name-display').forEach(el => el.textContent = name);
            }
        });
    </script>
</body>
</html>
